<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SignConnect — Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<div class="app-shell" id="appShell">

  <!-- ── Nav Rail ─────────────────────────────────────────── -->
  <nav class="nav-rail" aria-label="App navigation">
    <div class="rail-logo" aria-hidden="true">✋</div>
    <button class="rail-btn active" id="railChats"    data-rail="chats"    title="Chats"     aria-label="Chats"    aria-current="page">💬</button>
    <button class="rail-btn"        id="railContacts" data-rail="contacts" title="Contacts"  aria-label="Contacts">👥</button>
    <button class="rail-btn"        id="railSettings" data-rail="settings" title="Settings"  aria-label="Settings">⚙️</button>
    <div class="rail-spacer"></div>
    <button class="rail-btn rail-avatar" id="railProfile" title="Profile" aria-label="Your profile">
      <div class="avatar avatar-sm" id="navAvatar" style="background:var(--color-primary)">?</div>
    </button>
    <button class="rail-btn" id="railLogout" title="Logout" aria-label="Logout">⏻</button>
  </nav>

  <!-- ── Sidebar ──────────────────────────────────────────── -->
  <aside class="sidebar" id="sidebar" aria-label="Contact list">
    <div class="sidebar-header">
      <div class="sidebar-title">
        <span id="sidebarPanelTitle">Chats</span>
        <button class="btn-icon btn-sm" id="btnAddContact" title="Add contact" aria-label="Add contact">+</button>
      </div>
      <div class="search-box">
        <span class="search-icon" aria-hidden="true">🔍</span>
        <input class="search-input" type="search" id="contactSearch" placeholder="Search…" aria-label="Search contacts" autocomplete="off"/>
      </div>
    </div>
    <div class="sidebar-tabs" role="tablist">
      <button class="sidebar-tab active" role="tab" aria-selected="true"  data-panel="chats"    id="tabChats">💬 Chats</button>
      <button class="sidebar-tab"        role="tab" aria-selected="false" data-panel="contacts" id="tabContacts">👥 Contacts</button>
    </div>
    <div class="contacts-list" id="contactsList" role="list" aria-label="Conversations"></div>
  </aside>

  <!-- ── Main chat area ────────────────────────────────────── -->
  <main class="chat-area" id="chatArea" aria-label="Chat">

    <!-- Welcome screen -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-icon" aria-hidden="true">✋</div>
      <h2 class="welcome-title">Welcome to SignConnect</h2>
      <p class="welcome-desc">Select a contact to start chatting, or add someone new to begin a conversation.</p>
      <button class="btn btn-primary mt-4" id="welcomeAddBtn">+ Add Your First Contact</button>
    </div>

    <!-- Chat header -->
    <header class="chat-header hidden" id="chatHeader" aria-label="Chat with contact">
      <div class="contact-avatar-wrap" id="chatHeaderAvatarWrap">
        <div class="avatar avatar-md" id="chatHeaderAvatar"></div>
        <span class="contact-status status-dot" id="chatHeaderStatus"></span>
      </div>
      <div class="chat-header-info">
        <div class="chat-header-name" id="chatHeaderName"></div>
        <div class="chat-header-sub"  id="chatHeaderSub"></div>
      </div>
      <div class="chat-header-actions">
        <button class="btn-icon call-btn" id="btnVideoCall" title="Video call" aria-label="Start video call">📹</button>
        <button class="btn-icon call-btn" id="btnVoiceCall" title="Voice call"  aria-label="Start voice call">📞</button>
        <button class="btn-icon" id="btnSearch" title="Search messages" aria-label="Search messages">🔍</button>
        <button class="btn-icon" id="btnMore"   title="More options"    aria-label="More options">⋯</button>
      </div>
    </header>

    <!-- Messages -->
    <div class="messages-area hidden" id="messagesArea" role="log" aria-label="Messages" aria-live="polite"></div>

    <!-- Sign detection panel -->
    <div class="sign-panel" id="signPanel" aria-label="Sign language input">
      <div class="sign-panel-header">
        <span class="sign-panel-title"><span aria-hidden="true">🤟</span> Sign Language Input</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-secondary btn-sm" id="btnStartSign"  aria-label="Start camera">Start Camera</button>
          <button class="btn btn-secondary btn-sm" id="btnStopSign"   aria-label="Stop camera" disabled>Stop</button>
          <button class="btn-icon btn-sm"          id="btnCloseSign"  aria-label="Close panel">✕</button>
        </div>
      </div>
      <div class="sign-body">
        <div class="sign-video-wrap" id="signVideoWrap">
          <video id="signVideo" autoplay playsinline muted aria-label="Your camera"></video>
          <canvas id="signCanvas" aria-hidden="true"></canvas>
          <div class="sign-status-overlay">
            <div class="sign-gesture-label" id="signGestureLabel" aria-live="polite">Point camera at your hand</div>
            <div class="sign-confidence" id="signConfidence" aria-label="Detection confidence">
              <div class="confidence-bar" style="width:80px">
                <div class="confidence-fill" id="signConfFill" style="width:0%"></div>
              </div>
              <span id="signConfPct">0%</span>
            </div>
          </div>
        </div>
        <div class="sign-controls">
          <div>
            <div class="confidence-label">Detected words (click to remove)</div>
            <div class="sign-word-queue" id="signWordQueue" role="log" aria-label="Detected words" aria-live="polite"></div>
          </div>
          <div class="sign-actions">
            <button class="btn btn-secondary btn-sm w-full" id="btnClearSign">Clear</button>
            <button class="btn btn-primary w-full" id="btnSendSign" disabled>Send as Sign Message</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Message input bar -->
    <div class="input-bar hidden" id="inputBar">
      <div class="input-actions-left">
        <div class="relative">
          <button class="btn-icon" id="btnEmojiToggle" title="Emoji" aria-label="Emoji picker" aria-haspopup="true" aria-expanded="false">😊</button>
          <div class="emoji-picker" id="emojiPicker" role="dialog" aria-label="Emoji picker">
            <div class="emoji-tabs" id="emojiTabs" role="tablist"></div>
            <div class="emoji-search"><input type="search" id="emojiSearch" placeholder="Search emoji…" autocomplete="off" aria-label="Search emoji"/></div>
            <div class="emoji-grid" id="emojiGrid" role="grid" aria-label="Emoji grid"></div>
          </div>
        </div>
        <button class="btn-icon" id="btnSignToggle" title="Sign language input" aria-label="Sign language input" aria-pressed="false">🤟</button>
        <button class="btn-icon" id="btnAttach" title="Attach file" aria-label="Attach file">📎</button>
      </div>
      <div class="input-wrap">
        <textarea class="msg-input" id="msgInput" placeholder="Type a message…" rows="1"
          aria-label="Message input" aria-multiline="true" autocomplete="off"
          style="overflow-y:hidden"></textarea>
      </div>
      <div class="input-actions-right">
        <button class="send-btn" id="btnSend" title="Send message" aria-label="Send message" disabled>➤</button>
      </div>
    </div>
  </main>
</div>

<!-- ── Add Contact Modal ──────────────────────────────────────── -->
<div class="modal-backdrop hidden add-contact-modal" id="addContactModal" role="dialog" aria-modal="true" aria-labelledby="addContactTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="addContactTitle">Add Contact</h2>
      <button class="modal-close" id="addContactClose" aria-label="Close">&times;</button>
    </div>
    <div class="form-group">
      <label class="form-label" for="addContactSearch">Search by name or email</label>
      <input class="form-input" type="search" id="addContactSearch" placeholder="Search users…" autocomplete="off" aria-label="Search users"/>
    </div>
    <div class="contact-search-results" id="addContactResults" role="list" aria-label="Search results" aria-live="polite">
      <div class="empty-state">
        <div class="empty-icon">🔍</div>
        <p class="empty-desc">Start typing to search for users</p>
      </div>
    </div>
  </div>
</div>

<!-- ── Profile Modal ──────────────────────────────────────────── -->
<div class="modal-backdrop hidden" id="profileModal" role="dialog" aria-modal="true" aria-labelledby="profileTitle">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="profileTitle">Your Profile</h2>
      <button class="modal-close" id="profileClose" aria-label="Close">&times;</button>
    </div>
    <div style="text-align:center;margin-bottom:20px">
      <div class="avatar avatar-xl mx-auto" id="profileAvatar" style="background:var(--color-primary)"></div>
    </div>
    <div class="form-group">
      <label class="form-label">Display Name</label>
      <input class="form-input" type="text" id="profileName" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label class="form-label">Bio</label>
      <textarea class="form-input" id="profileBio" rows="3" placeholder="Tell people about yourself…"></textarea>
    </div>
    <button class="btn btn-primary w-full" id="btnSaveProfile">Save Changes</button>
  </div>
</div>

<div id="toast-container" role="alert" aria-live="polite"></div>

<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
